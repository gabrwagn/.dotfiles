
# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# change border color for fullscreen windows
windowrule = border_color rgb(D9BC8C) rgb(8DA3B9), match:fullscreen 1
windowrule = border_size 3, match:fullscreen 1

# Fix some dragging issues with XWayland
windowrule = no_focus 1, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# layerrule = blur 1, match:namespace waybar
layerrule = blur 1, match:namespace swaync-control-center
layerrule = blur 1, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.1, match:namespace swaync-control-center
layerrule = ignore_alpha 0.1, match:namespace swaync-notification-window

# Application-specific settings
# firefox
windowrule = opacity 1.0, match:class ^(org.mozilla.firefox)$
windowrule = opacity 1.0, match:class ^(org.mozilla.firefox)$, match:title .*Twitch.*
windowrule = idle_inhibit focus, match:class ^(org.mozilla.firefox)$, match:title .*Twitch.*
windowrule = opacity 1.0, match:class ^(org.mozilla.firefox)$, match:title .*[Yy]ou[Tt]ube.*
windowrule = idle_inhibit focus, match:class ^(org.mozilla.firefox)$, match:title .*[Yy]ou[Tt]ube.*
windowrule = opacity 1.0, match:class ^(org.mozilla.firefox)$, match:title .*[Zz]oom.*
windowrule = idle_inhibit always, match:class ^(org.mozilla.firefox)$, match:title .*[Zz]oom.*

# Project Epoch (WoW 3.3.5 - XWayland)
# 'immediate' bypasses compositor rendering - fixes black screen after Mesa upgrades
windowrule = immediate 1, match:initial_class ^(steam_app_default)$, match:initial_title ^(World of Warcraft)$
windowrule = fullscreen 1, match:initial_class ^(steam_app_default)$, match:initial_title ^(World of Warcraft)$
windowrule = idle_inhibit always, match:initial_class ^(steam_app_default)$, match:initial_title ^(World of Warcraft)$

windowrule = opacity 0.85, match:class ^(org.pwmt.zathura)$
windowrule = float 1, match:class ^(safeeyes)$
windowrule = suppress_event fullscreen, match:class ^(safeeyes)$

#Picture-in-Picture special treatment
#For the picture in picture extension by google, using with brave browser
windowrule = float 1, match:title (Picture-in-Picture)
windowrule = size 585 330, match:title (Picture-in-Picture)
windowrule = move 100%-816 50, match:title (Picture-in-Picture)
windowrule = pin 1, match:title (Picture-in-Picture)
windowrule = no_dim 1, match:title (Picture-in-Picture)
windowrule = opacity 1, match:title (Picture-in-Picture)
windowrule = no_initial_focus 1, match:title (Picture-in-Picture)
